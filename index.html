<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="google-site-verification" content="iRSfZrGcd8Qyd3QsiH-T7_GngBGsWUgnHYlYI84LfBw" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>TeamFinder</title>
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('teamFinderTheme');
          var theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : 'dark';
          document.documentElement.dataset.theme = theme;
          document.documentElement.classList.toggle('dark', theme === 'dark');
        } catch (error) {
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
